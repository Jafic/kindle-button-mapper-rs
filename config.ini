# Kindle Button Mapper Configuration
#
# This file maps input device keys to scripts/commands.
# Use `just list-devices` to find the device name.

[device]
# Name of the input device to monitor (from /sys/class/input/eventX/device/name)
# Leave empty to use the device path directly
name =

# Direct path to input device (optional, overrides name lookup)
path = /dev/input/event2

# Grab device for exclusive access (prevents other apps from receiving events)
grab = false

[settings]
# Debounce time in milliseconds (prevents double-triggers, 0 to disable)
debounce_ms = 0

# Log button presses to the log file
log_buttons = true

# Time in milliseconds to trigger long press action (hold threshold)
long_press_ms = 500

# Repeat interval in milliseconds when holding a button (0 to disable repeat)
repeat_ms = 100

# Script to run when device connects (e.g., inhibit screen saver)
on_connect = /mnt/us/kindle-button-mapper/scripts/start-inhib.sh

# Script to run when device disconnects (e.g., allow screen saver)
on_disconnect = /mnt/us/kindle-button-mapper/scripts/stop-inhib.sh

[buttons]
# Controller button mappings
# | Controller | HID Button | Linux Code | Name      |
# |------------|------------|------------|-----------|
# | A          | 1          | 304        | BTN_SOUTH |
# | B          | 2          | 305        | BTN_EAST  |
# | X          | 3          | 306        | BTN_C     |
# | Y          | 4          | 307        | BTN_NORTH |
# | LB         | 5          | 308        | BTN_Y     |
# | RB         | 6          | 309        | BTN_Z     |
# | Select     | 7          | 310        | BTN_TL    |
# | Start      | 8          | 311        | BTN_TR    |

# BTN_SOUTH (304) = Next page
304 = /mnt/us/kindle-button-mapper/scripts/nextPage.sh

# BTN_NORTH (307) = Previous page
307 = /mnt/us/kindle-button-mapper/scripts/prevPage.sh

# BTN_EAST (305) = Brightness up (+1)
305 = /mnt/us/kindle-button-mapper/scripts/brightness.sh 1

# BTN_C (306) = Brightness down (-1)
306 = /mnt/us/kindle-button-mapper/scripts/brightness.sh -10

# BTN_WEST (308) = Brightness down (-1)
308 = /mnt/us/kindle-button-mapper/scripts/brightness.sh -10

# BTN_Z (309) = Next page
309 = /mnt/us/kindle-button-mapper/scripts/nextPage.sh

# BTN_TL (310) = Brightness toggle
310 = /mnt/us/kindle-button-mapper/scripts/brightnessToggle.sh

# BTN_TR (311) = (unmapped - was endReading, now handled by on_disconnect)
# 311 =

[longpress]
# Long press mappings (triggered when held for 500ms+)

[dpad]
# D-pad mappings (Hat0X/Hat0Y axis events)
# Short press: small brightness adjustment
up = /mnt/us/kindle-button-mapper/scripts/prevPage.sh
down = /mnt/us/kindle-button-mapper/scripts/nextPage.sh
left = /mnt/us/kindle-button-mapper/scripts/brightness.sh -1
right = /mnt/us/kindle-button-mapper/scripts/brightness.sh 1

[dpad_longpress]
# D-pad long press mappings (triggered when held, then repeats)
# Long press: larger brightness adjustment for faster changes
left = /mnt/us/kindle-button-mapper/scripts/brightness.sh -10
right = /mnt/us/kindle-button-mapper/scripts/brightness.sh 10

[triggers]
# Analog trigger mappings (Gas/Brake axis events)
# Short press: small brightness adjustment
lt = /mnt/us/kindle-button-mapper/scripts/brightness.sh -1
rt = /mnt/us/kindle-button-mapper/scripts/brightness.sh 1

[triggers_longpress]
# Trigger long press mappings (triggered when held, then repeats)
# Long press: larger brightness adjustment for faster changes
lt = /mnt/us/kindle-button-mapper/scripts/brightness.sh -10
rt = /mnt/us/kindle-button-mapper/scripts/brightness.sh 10
